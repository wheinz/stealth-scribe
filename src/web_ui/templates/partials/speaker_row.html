<span id="speaker-{{ speaker_id }}"
      class="inline-flex items-center gap-2">
    {% if display_name %}
        <span class="font-medium text-gray-200">{{ display_name }}</span>
    {% else %}
        <span class="text-gray-500 font-mono text-xs">{{ speaker_id }}</span>
    {% endif %}
    <button
        hx-get="/meeting/{{ stem }}/speaker/{{ speaker_id }}/"
        hx-target="#speaker-{{ speaker_id }}"
        hx-swap="outerHTML"
        class="text-gray-600 hover:text-gray-400 transition-colors cursor-pointer border-0 bg-transparent p-0"
        title="Edit speaker name"
    >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
        </svg>
    </button>
</span>
